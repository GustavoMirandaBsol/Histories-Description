name: Deploy React to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mapa-metodos/package-lock.json

      - run: npm ci
        working-directory: mapa-metodos

      - run: npm run build
        working-directory: mapa-metodos

      - uses: actions/upload-pages-artifact@v3
        with:
          path: mapa-metodos/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4